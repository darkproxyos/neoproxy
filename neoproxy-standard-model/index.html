<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NeoProxy — Collider Drift</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas {
    width:100%;
    height:100%;
    display:block;
    outline:none;
}

#hint {
    position:fixed;
    bottom:18px;
    left:18px;
    color:rgba(255,255,255,0.18);
    font-family:monospace;
    font-size:12px;
    letter-spacing:2px;
    pointer-events:none;
}
</style>

<script type="importmap">
{
    "imports": {
        "@babylonjs/core": "https://cdn.jsdelivr.net/npm/@babylonjs/core@6.25.0/+esm",
        "@babylonjs/loaders": "https://cdn.jsdelivr.net/npm/@babylonjs/loaders@6.25.0/+esm"
    }
}
</script>
</head>

<body>

<canvas id="renderCanvas"></canvas>
<div id="hint">NeoProxy Collider Drift</div>

<script type="module">

import * as BABYLON from "@babylonjs/core";
import "@babylonjs/loaders";

const canvas = document.getElementById("renderCanvas");

const engine = new BABYLON.Engine(canvas, true, {
    antialias: true,
    stencil: true
});

const scene = new BABYLON.Scene(engine);

scene.clearColor = new BABYLON.Color4(0,0,0,1);

scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
scene.fogDensity = 0.006;
scene.fogColor = new BABYLON.Color3(0.01,0.01,0.03);





// =====================================================
// CAMERA
// =====================================================

const camera = new BABYLON.FreeCamera(
    "camera",
    new BABYLON.Vector3(0,2,0),
    scene
);

camera.fov = 1.18;





// =====================================================
// LIGHTING
// =====================================================

const hemi = new BABYLON.HemisphericLight(
    "hemi",
    new BABYLON.Vector3(0,1,0),
    scene
);

hemi.intensity = 0.42;
hemi.groundColor = new BABYLON.Color3(0.04,0.03,0.09);

const point = new BABYLON.PointLight(
    "point",
    new BABYLON.Vector3(0,0,0),
    scene
);

point.intensity = 1.4;

const glow = new BABYLON.GlowLayer("glow", scene);
glow.intensity = 0.85;





// =====================================================
// STARFIELD
// =====================================================

function createStars(count, minR, maxR, minS, maxS, color) {

    for(let i=0;i<count;i++) {

        const star = BABYLON.MeshBuilder.CreateSphere(
            "star",
            {
                diameter:
                    minS + Math.random()*(maxS-minS)
            },
            scene
        );

        const r = minR + Math.random()*(maxR-minR);

        const theta = Math.random()*Math.PI*2;
        const phi = Math.acos(2*Math.random()-1);

        star.position.x = r*Math.sin(phi)*Math.cos(theta);
        star.position.y = r*Math.sin(phi)*Math.sin(theta);
        star.position.z = r*Math.cos(phi);

        const mat = new BABYLON.StandardMaterial("mat", scene);

        mat.emissiveColor =
            color.scale(0.4 + Math.random()*0.8);

        mat.diffuseColor = BABYLON.Color3.Black();
        mat.specularColor = BABYLON.Color3.Black();

        star.material = mat;
    }
}

createStars(
    2400,
    250,
    650,
    0.05,
    0.22,
    new BABYLON.Color3(0.7,0.8,1)
);

createStars(
    1200,
    120,
    240,
    0.12,
    0.35,
    new BABYLON.Color3(0.5,0.65,1)
);

createStars(
    900,
    40,
    110,
    0.16,
    0.45,
    new BABYLON.Color3(0.85,0.92,1)
);





// =====================================================
// COLLIDER DONUT
// =====================================================

const collider = BABYLON.MeshBuilder.CreateTorus(
    "collider",
    {
        diameter: 74,
        thickness: 1.6,
        tessellation: 260
    },
    scene
);

collider.rotation.x = Math.PI / 2;

const colliderMat =
    new BABYLON.StandardMaterial(
        "colliderMat",
        scene
    );

colliderMat.wireframe = true;
colliderMat.alpha = 0.22;

colliderMat.emissiveColor =
    new BABYLON.Color3(0.18,0.52,1);

collider.material = colliderMat;





// =====================================================
// INNER ENERGY RINGS
// =====================================================

const rings = [];

for(let i=0;i<5;i++){

    const ring = BABYLON.MeshBuilder.CreateTorus(
        "ring"+i,
        {
            diameter: 20 + i*6,
            thickness: 0.04 + i*0.01,
            tessellation: 180
        },
        scene
    );

    ring.rotation.x = Math.PI/2;

    const mat = new BABYLON.StandardMaterial(
        "mat"+i,
        scene
    );

    mat.emissiveColor = new BABYLON.Color3(
        0.3 + i*0.08,
        0.5,
        1
    );

    mat.wireframe = true;

    ring.material = mat;

    rings.push(ring);
}





// =====================================================
// ASYMMETRIC FIGURE 8
// =====================================================

const baseA = 34;
const deltaA = 16;

const baseOmega = 0.48;
const accelFactor = 0.85;

function getPath(t){

    const sinT = Math.sin(t);
    const cosT = Math.cos(t);

    const a = baseA + deltaA*sinT;

    const denom = 1 + sinT*sinT;

    const x =
        a * cosT / denom;

    const z =
        a * sinT * cosT / denom;

    return new BABYLON.Vector3(x,0,z);
}

function getDirection(t){

    const p1 = getPath(t-0.01);
    const p2 = getPath(t+0.01);

    return p2.subtract(p1).normalize();
}





// =====================================================
// TRAIL CURVE VISUALIZATION
// =====================================================

const curvePoints = [];

for(let i=0;i<1200;i++){

    const t = (i/1200)*Math.PI*2;

    curvePoints.push(getPath(t));
}

const curve =
    BABYLON.MeshBuilder.CreateLines(
        "curve",
        {
            points: curvePoints
        },
        scene
    );

curve.color = new BABYLON.Color3(0.3,0.7,1);





// =====================================================
// STANDARD MODEL PARTICLES
// =====================================================

const particleData = [
    ["UP",      new BABYLON.Color3(1,0.2,0.2)],
    ["DOWN",    new BABYLON.Color3(0.2,1,0.2)],
    ["STRANGE", new BABYLON.Color3(0.2,0.4,1)],
    ["CHARM",   new BABYLON.Color3(1,0.8,0.2)],
    ["TOP",     new BABYLON.Color3(1,0.3,0.8)],
    ["BOTTOM",  new BABYLON.Color3(0.5,1,1)],
    ["ELECTRON",new BABYLON.Color3(1,0.5,0.2)],
    ["MUON",    new BABYLON.Color3(0.8,0.3,1)],
    ["TAU",     new BABYLON.Color3(0.2,1,0.7)],
    ["PHOTON",  new BABYLON.Color3(1,0.9,0.3)],
    ["GLUON",   new BABYLON.Color3(1,1,0.5)],
    ["Z",       new BABYLON.Color3(1,0.5,1)],
    ["W",       new BABYLON.Color3(0.5,0.7,1)],
    ["HIGGS",   new BABYLON.Color3(1,0.4,0.6)]
];

const particles = [];

particleData.forEach((p, i)=>{

    const sphere =
        BABYLON.MeshBuilder.CreateSphere(
            p[0],
            {
                diameter:
                    0.35 + Math.random()*0.5
            },
            scene
        );

    const mat =
        new BABYLON.StandardMaterial(
            p[0]+"Mat",
            scene
        );

    mat.emissiveColor = p[1];
    mat.diffuseColor = BABYLON.Color3.Black();

    sphere.material = mat;

    particles.push({
        mesh: sphere,
        offset:
            (i/particleData.length)
            * Math.PI*2,
        speed:
            1 + Math.random()*0.22
    });
});





// =====================================================
// CORE
// =====================================================

const core =
    BABYLON.MeshBuilder.CreateSphere(
        "core",
        {
            diameter: 1.8
        },
        scene
    );

const coreMat =
    new BABYLON.StandardMaterial(
        "coreMat",
        scene
    );

coreMat.emissiveColor =
    new BABYLON.Color3(1,0.4,0.2);

coreMat.diffuseColor =
    new BABYLON.Color3(0.1,0.03,0.01);

core.material = coreMat;





// =====================================================
// ENERGY PARTICLES
// =====================================================

const dust =
    new BABYLON.ParticleSystem(
        "dust",
        1400,
        scene
    );

dust.particleTexture =
    new BABYLON.Texture(
        "https://assets.babylonjs.com/textures/flare.png",
        scene
    );

dust.emitter =
    new BABYLON.Vector3(0,0,0);

dust.minEmitBox =
    new BABYLON.Vector3(-45,-8,-45);

dust.maxEmitBox =
    new BABYLON.Vector3(45,8,45);

dust.color1 =
    new BABYLON.Color4(
        0.3,0.5,1,0.2
    );

dust.color2 =
    new BABYLON.Color4(
        0.8,0.4,1,0.16
    );

dust.minSize = 0.04;
dust.maxSize = 0.25;

dust.minLifeTime = 3;
dust.maxLifeTime = 8;

dust.emitRate = 120;

dust.gravity =
    new BABYLON.Vector3(0,0.01,0);

dust.start();





// =====================================================
// MOTION
// =====================================================

let t = 0;
let breath = 0;
let last = performance.now()/1000;

scene.onBeforeRenderObservable.add(()=>{

    const now = performance.now()/1000;

    let dt = now-last;

    last = now;

    if(dt > 0.03) dt = 0.03;

    const sinT = Math.sin(t);

    const a = baseA + deltaA*sinT;

    const maxA = baseA + deltaA;
    const minA = baseA - deltaA;

    const accel =
        1 +
        accelFactor *
        (1 - (a-minA)/(maxA-minA));

    const omega =
        baseOmega * accel;

    t += omega * dt;





    // CAMERA

    const pos = getPath(t);

    breath += 0.012;

    const vertical =
        2.2 +
        Math.sin(breath*1.8)*0.8 +
        Math.sin(breath*0.4)*0.3;

    camera.position.x = pos.x;
    camera.position.z = pos.z;
    camera.position.y = vertical;

    const lookAhead =
        getPath(t + 0.18);

    camera.setTarget(
        new BABYLON.Vector3(
            lookAhead.x,
            0.8,
            lookAhead.z
        )
    );





    // PARTICLES

    particles.forEach((p,i)=>{

        const pt =
            t * p.speed + p.offset;

        const pp = getPath(pt);

        p.mesh.position.x = pp.x;
        p.mesh.position.z = pp.z;

        p.mesh.position.y =
            Math.sin(
                breath*2 +
                p.offset*3
            ) * 0.5;

        p.mesh.rotation.y += 0.02;

    });





    // CORE PULSE

    const pulse =
        1 +
        Math.sin(now*4)*0.12;

    core.scaling.set(
        pulse,
        pulse,
        pulse
    );

    coreMat.emissiveIntensity =
        1.2 +
        Math.sin(now*3)*0.4;





    // RINGS

    rings.forEach((r,i)=>{

        r.rotation.z += 0.0006 + i*0.0001;
        r.rotation.y += 0.0002 + i*0.00005;

    });





    // COLLIDER

    collider.rotation.z += 0.0004;
    collider.rotation.y += 0.00015;





    // GLOW

    glow.intensity =
        0.82 +
        Math.sin(now*1.5)*0.08;

});





// =====================================================
// RENDER
// =====================================================

engine.runRenderLoop(()=>{

    scene.render();

});

window.addEventListener(
    "resize",
    ()=>engine.resize()
);

console.log(
    "NeoProxy Collider Drift online."
);

</script>

</body>
</html>
